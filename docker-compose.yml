version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ticket_system_db
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: ticket_system
    ports:
      - "3307:3306"
    volumes:
      - ticket_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ticket_db_data: